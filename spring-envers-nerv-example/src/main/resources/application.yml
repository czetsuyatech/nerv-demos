logging:
  level:
    root: info
    liquibase: DEBUG
    org.springframework.boot.autoconfigure.liquibase: DEBUG

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nerv-example?currentSchema=envers}
    driver-class-name: org.postgresql.Driver
    username: nerv
    password: nerv
    hikari:
      connection-test-query: SELECT 1
      jdbc-url: ${spring.datasource.url}
      maximum-pool-size: 17
      minimum-idle: 10
      pool-name: ct-pool-example
      username: ${spring.datasource.username}
      password: ${spring.datasource.password}
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: envers
  liquibase:
    enabled: true
    default-schema: envers
    change-log: classpath:db/changelog/db.changelog-master.xml
    fail-on-error: true
    drop-first: true

nerv:
  audit:
    audit-insert: true
    audit-strategy-type: vertical
