logging:
  level:
    root: info
    liquibase: trace
    org.springframework.boot.autoconfigure.liquibase: trace

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:5432/nerv-examples?currentSchema=nervaudit
    driver-class-name: org.postgresql.Driver
    username: nerv
    password: nerv
    hikari:
      connection-test-query: SELECT 1
      maximum-pool-size: 17
      minimum-idle: 10
      pool-name: ct-pool
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: nervaudit
        envers:
          autoRegisterListeners: false
    generate-ddl: true

  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: nervaudit
    liquibase-schema: nervaudit
    fail-on-error: true

nerv:
  audit:
    audit-insert: true
    audit-strategy-type: vertical
